<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#070b10" />
  <title>Dart Score Pro V4</title>
  <style>
    :root{--bg:#070b10;--card:#111827;--card2:#1f2937;--text:#f9fafb;--muted:#9ca3af;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#38bdf8;--border:#334155}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:radial-gradient(circle at top,#172033,#070b10 55%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:18px}
    h1{font-size:36px;margin:0 0 6px;font-weight:950;letter-spacing:-.05em}
    h2{font-size:24px;margin:0 0 14px}.sub{color:var(--muted);font-size:16px;font-weight:800;margin-bottom:22px}
    .card{background:rgba(17,24,39,.96);border:1px solid var(--border);border-radius:24px;padding:18px;margin-bottom:14px}
    input,button,select{width:100%;border-radius:18px;border:1px solid var(--border);padding:16px;font-size:19px;background:var(--card2);color:var(--text)}
    button{border:0;background:var(--green);color:#04130a;font-weight:950;margin-top:10px}
    .secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
    .danger{background:var(--red);color:white}.warn{background:var(--yellow);color:#1c1000}.blue{background:var(--blue);color:#001018}
    .hidden{display:none!important}.small{font-size:13px;color:var(--muted);line-height:1.45}.ok{color:#bbf7d0;font-weight:900}.err{color:#fecaca;font-weight:900}
    .code{font-size:40px;letter-spacing:.13em;font-weight:950;text-align:center;padding:18px;border:1px dashed var(--blue);border-radius:18px;background:#020617;color:#bae6fd}
    .players{display:grid;gap:12px}.player{background:#0f172a;border:1px solid var(--border);border-radius:22px;padding:18px}.active{border-color:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,.18)}
    .name{font-size:15px;color:var(--muted);font-weight:800}.score{font-size:62px;font-weight:950;line-height:1}
    .meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:10px}.meta span{background:#020617;border:1px solid #1e293b;border-radius:999px;padding:5px 8px}
    .display{height:72px;display:flex;align-items:center;justify-content:center;background:#020617;border:1px solid var(--border);border-radius:18px;font-size:40px;font-weight:950;margin-bottom:10px}
    .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:9px}.quick button{background:#172033;color:var(--text);padding:12px;font-size:15px;margin:0}
    .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pad button{background:var(--card2);color:var(--text);font-size:24px;padding:16px;margin:0}
    .turn{display:flex;justify-content:space-between;border-bottom:1px solid #1e293b;padding:8px 0;font-size:14px;color:var(--muted)}
    .toprow{display:flex;gap:8px}.toprow button{margin-top:0}
    .pill{display:inline-block;background:#020617;border:1px solid #1e293b;border-radius:999px;padding:7px 10px;color:var(--muted);font-size:12px;font-weight:800}
  </style>
</head>
<body>
  <h1>🎯 Dart Score Pro</h1>
  <div class="sub">V4 · Multiplayer Pro</div>

  <section id="menu" class="card">
    <h2>Online Spiel</h2>
    <select id="startScore"><option>501</option><option>301</option><option>701</option></select>
    <select id="bestOf" style="margin-top:9px"><option value="1">1 Leg</option><option value="3">Best of 3</option><option value="5">Best of 5</option><option value="7">Best of 7</option></select>
    <input id="p1Name" value="Spieler 1" placeholder="Spieler 1" style="margin-top:9px">
    <input id="p2Name" value="Spieler 2" placeholder="Spieler 2" style="margin-top:9px">
    <button onclick="createGame()">Spiel erstellen</button>
    <hr style="border-color:#334155;margin:18px 0">
    <input id="joinCode" placeholder="Raum-Code eingeben">
    <button class="secondary" onclick="joinGame()">Spiel beitreten</button>
    <button class="secondary hidden" id="resumeBtn" onclick="resumeGame()">Letztes Spiel fortsetzen</button>
    <div id="menuStatus" class="small" style="margin-top:12px">Bereit.</div>
  </section>

  <main id="game" class="hidden">
    <section class="card">
      <div class="small">Raum-Code</div>
      <div id="codeDisplay" class="code">-----</div>
      <div class="toprow" style="margin-top:10px">
        <button class="secondary" onclick="copyCode()">Code kopieren</button>
        <button class="secondary" onclick="shareRoom()">Teilen</button>
      </div>
      <div id="syncStatus" class="small" style="margin-top:9px">Verbinde...</div>
    </section>

    <div id="players" class="players"></div>

    <section class="card">
      <h2 id="turnTitle">Score eingeben</h2>
      <div id="display" class="display">0</div>
      <div class="quick">
        <button onclick="setInput(26)">26</button><button onclick="setInput(45)">45</button><button onclick="setInput(60)">60</button><button onclick="setInput(81)">81</button>
        <button onclick="setInput(100)">100</button><button onclick="setInput(121)">121</button><button onclick="setInput(140)">140</button><button onclick="setInput(180)">180</button>
      </div>
      <div class="pad">
        <button onclick="num('1')">1</button><button onclick="num('2')">2</button><button onclick="num('3')">3</button>
        <button onclick="num('4')">4</button><button onclick="num('5')">5</button><button onclick="num('6')">6</button>
        <button onclick="num('7')">7</button><button onclick="num('8')">8</button><button onclick="num('9')">9</button>
        <button class="warn" onclick="clearInput()">C</button><button onclick="num('0')">0</button><button class="danger" onclick="undoTurn()">↶</button>
      </div>
      <button onclick="submitScore()">Score buchen</button>
      <div class="toprow" style="margin-top:10px">
        <button class="secondary" onclick="newLeg()">Neues Leg</button>
        <button class="danger" onclick="leaveGame()">Verlassen</button>
      </div>
    </section>

    <section class="card">
      <h2>Letzte Würfe</h2>
      <div id="turnList" class="small">Noch keine Würfe.</div>
    </section>
  </main>

<script>
const SUPABASE_URL = "https://enhswbayupniwielxxqc.supabase.co";
const SUPABASE_KEY = "sb_publishable_XHyt9DuEBIp97Z0YwsoauA_ua--ZoDY";
const API = SUPABASE_URL + "/rest/v1/games";

let roomCode=null,currentState=null,input="",pollTimer=null,isSaving=false,lastVersion=0;

function headers(extra={}) {
  return {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json",...extra};
}

function setMenuStatus(t,bad=false){document.getElementById("menuStatus").innerHTML=bad?`<span class="err">${t}</span>`:`<span class="ok">${t}</span>`}
function setStatus(t,ok=true){document.getElementById("syncStatus").innerHTML=ok?`<span class="ok">${t}</span>`:`<span class="err">${t}</span>`}
function generateCode(){return Math.random().toString(36).substring(2,7).toUpperCase()}
function now(){return new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}

function makeState(){
  const start=parseInt(document.getElementById("startScore").value);
  return {
    start:start,
    bestOf:parseInt(document.getElementById("bestOf").value),
    current:0,
    version:1,
    updatedAt:new Date().toISOString(),
    players:[
      {name:document.getElementById("p1Name").value||"Spieler 1",score:start,darts:0,points:0,high:0,legs:0,one80:0,one40:0,one00:0},
      {name:document.getElementById("p2Name").value||"Spieler 2",score:start,darts:0,points:0,high:0,legs:0,one80:0,one40:0,one00:0}
    ],
    turns:[],
    history:[]
  };
}

async function createGame(){
  try {
    setMenuStatus("Erstelle Raum...");
    roomCode = generateCode();
    currentState = makeState();

    const res = await fetch(API, {
      method:"POST",
      headers: headers({"Prefer":"return=representation"}),
      body: JSON.stringify({room_code: roomCode, state: currentState})
    });

    const text = await res.text();
    if(!res.ok){setMenuStatus("Fehler: " + text, true);return}

    localStorage.setItem("lastRoomCode", roomCode);
    openGame();
  } catch(e) { setMenuStatus("Browser/Netzwerk Fehler: " + e.message, true); }
}

async function joinGame(){
  roomCode = document.getElementById("joinCode").value.trim().toUpperCase();
  if(!roomCode){setMenuStatus("Bitte Code eingeben.", true);return}
  await loadAndOpen(roomCode);
}

async function resumeGame(){
  const code=localStorage.getItem("lastRoomCode");
  if(code) await loadAndOpen(code);
}

async function loadAndOpen(code){
  try {
    setMenuStatus("Suche Raum...");
    const data = await fetchGame(code);
    if(!data){setMenuStatus("Raum nicht gefunden.", true);return}
    roomCode=code;
    currentState=data.state;
    localStorage.setItem("lastRoomCode", roomCode);
    openGame();
  } catch(e) { setMenuStatus("Fehler: " + e.message, true); }
}

async function fetchGame(code){
  const url = API + "?room_code=eq." + encodeURIComponent(code) + "&select=*";
  const res = await fetch(url, {headers: headers()});
  const data = await res.json();
  if(!res.ok || !data.length) return null;
  return data[0];
}

function openGame(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("codeDisplay").innerText = roomCode;
  lastVersion = currentState.version || 0;
  render();
  startPolling();
}

function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadState, 1000);
  setStatus("Online verbunden · " + now());
}

async function loadState(){
  if(isSaving || !roomCode) return;
  try {
    const data = await fetchGame(roomCode);
    if(data && data.state){
      const incomingVersion = data.state.version || 0;
      if(incomingVersion >= lastVersion){
        currentState = data.state;
        lastVersion = incomingVersion;
        render();
        setStatus("Live aktualisiert · " + now());
      }
    }
  } catch(e) { setStatus("Sync Fehler: " + e.message, false); }
}

async function saveState(){
  isSaving=true;
  currentState.version = (currentState.version || 0) + 1;
  currentState.updatedAt = new Date().toISOString();
  lastVersion = currentState.version;

  const url = API + "?room_code=eq." + encodeURIComponent(roomCode);
  const res = await fetch(url, {
    method:"PATCH",
    headers: headers({"Prefer":"return=minimal"}),
    body: JSON.stringify({state: currentState})
  });

  isSaving=false;
  if(!res.ok){
    const text=await res.text();
    alert("Speichern fehlgeschlagen: " + text);
  } else {
    setStatus("Gespeichert · " + now());
  }
}

function avg(p){return p.darts?(p.points/p.darts*3).toFixed(1):"0.0"}
function render(){
  if(!currentState)return;
  const needed=Math.ceil(currentState.bestOf/2);
  document.getElementById("players").innerHTML=currentState.players.map((p,i)=>`
    <div class="player ${i===currentState.current?'active':''}">
      <div class="name">${p.name}${i===currentState.current?' · dran':''}</div>
      <div class="score">${p.score}</div>
      <div class="meta"><span>Legs ${p.legs}/${needed}</span><span>Avg ${avg(p)}</span><span>Darts ${p.darts}</span><span>High ${p.high}</span><span>100+ ${p.one00}</span><span>140+ ${p.one40}</span><span>180er ${p.one80}</span></div>
    </div>`).join("");
  document.getElementById("turnTitle").innerText=currentState.players[currentState.current].name+" ist dran";
  document.getElementById("display").innerText=input||"0";
  document.getElementById("turnList").innerHTML=currentState.turns.slice(-10).reverse().map(t=>`<div class="turn"><span>${t.time} · ${t.player}</span><b>${t.score}</b><span>Rest ${t.rest}</span></div>`).join("")||"Noch keine Würfe.";
}

function num(n){if(input.length>=3)return;input+=n;if(+input>180)input="180";render()}
function setInput(v){input=String(v);render()}
function clearInput(){input="";render()}
function countMilestones(p,v){if(v===180)p.one80++; if(v>=140)p.one40++; if(v>=100)p.one00++}

async function submitScore(){
  const val=parseInt(input||"0");
  if(isNaN(val)||val<0||val>180)return alert("Score muss 0–180 sein.");
  const p=currentState.players[currentState.current];
  currentState.history.push(JSON.parse(JSON.stringify(currentState)));
  const ns=p.score-val;

  if(ns<0||ns===1){
    p.darts+=3;
    currentState.turns.push({time:now(),player:p.name,score:"Bust "+val,rest:p.score});
    currentState.current=(currentState.current+1)%currentState.players.length;
  } else if(ns===0){
    p.score=0;p.darts+=3;p.points+=val;p.high=Math.max(p.high,val);countMilestones(p,val);
    currentState.turns.push({time:now(),player:p.name,score:val,rest:0});
    p.legs++;
    const needed=Math.ceil(currentState.bestOf/2);
    if(p.legs>=needed){input="";render();await saveState();alert("🏆 Match gewonnen: "+p.name);return}
    alert("🎉 Leg gewonnen: "+p.name);
    resetLegScores();
  } else {
    p.score=ns;p.darts+=3;p.points+=val;p.high=Math.max(p.high,val);countMilestones(p,val);
    currentState.turns.push({time:now(),player:p.name,score:val,rest:p.score});
    currentState.current=(currentState.current+1)%currentState.players.length;
  }

  input="";
  render();
  await saveState();
}

function resetLegScores(){
  currentState.players.forEach(x=>{x.score=currentState.start;x.darts=0;x.points=0;x.high=0});
  currentState.current=0;
}

async function newLeg(){
  if(!confirm("Neues Leg starten?")) return;
  currentState.history.push(JSON.parse(JSON.stringify(currentState)));
  resetLegScores();
  currentState.turns.push({time:now(),player:"System",score:"Neues Leg",rest:"-"});
  render();
  await saveState();
}

async function undoTurn(){
  if(!currentState.history.length)return alert("Kein Undo verfügbar.");
  currentState=currentState.history.pop();
  input="";
  render();
  await saveState();
}

function copyCode(){navigator.clipboard.writeText(roomCode).then(()=>alert("Code kopiert: "+roomCode))}
function shareRoom(){
  const txt="Dart Match Code: "+roomCode;
  if(navigator.share) navigator.share({title:"Dart Score Pro",text:txt});
  else copyCode();
}
function leaveGame(){
  if(pollTimer) clearInterval(pollTimer);
  roomCode=null;currentState=null;input="";
  document.getElementById("game").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

window.addEventListener("load",()=>{
  const last=localStorage.getItem("lastRoomCode");
  if(last){document.getElementById("resumeBtn").classList.remove("hidden");}
});
</script>
</body>
</html>
