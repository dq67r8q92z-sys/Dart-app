<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0b1117" />
  <link rel="manifest" href="/manifest.json">
  <title>Dart Score Pro</title>
  <style>
    :root{--bg:#0b1117;--card:#111827;--card2:#1f2937;--text:#f9fafb;--muted:#9ca3af;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--border:#374151}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:radial-gradient(circle at top,#172033,#0b1117 55%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:18px;padding-bottom:30px}
    h1{margin:0 0 14px;font-size:30px;letter-spacing:-.04em}
    h2{margin:0 0 10px;font-size:19px}
    .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
    .card{background:rgba(17,24,39,.92);border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 12px 40px rgba(0,0,0,.22)}
    .row{display:flex;gap:10px}.row>*{flex:1}
    input,select,button{width:100%;border-radius:16px;border:1px solid var(--border);padding:14px;font-size:17px;background:var(--card2);color:var(--text)}
    button{border:0;background:var(--green);color:#04130a;font-weight:800}
    .secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
    .danger{background:var(--red);color:#fff}.warn{background:var(--yellow);color:#1c1000}
    .players{display:grid;gap:10px}
    .player{padding:16px;border-radius:22px;background:#0f172a;border:1px solid var(--border)}
    .active{border-color:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,.18)}
    .name{font-size:14px;color:var(--muted);margin-bottom:6px}.score{font-size:54px;font-weight:950;line-height:.95}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:10px}
    .checkout{margin-top:12px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);border-radius:14px;padding:10px;color:#bbf7d0;font-weight:800}
    .display{height:66px;display:flex;align-items:center;justify-content:center;border-radius:18px;background:#020617;border:1px solid var(--border);font-size:38px;font-weight:950;margin-bottom:10px}
    .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}.quick button{background:#172033;color:var(--text)}
    .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pad button{background:var(--card2);color:var(--text);font-size:24px;padding:16px}
    .hidden{display:none}.tiny{font-size:12px;color:var(--muted);line-height:1.4}
  </style>
</head>
<body>
  <h1>🎯 Dart Score Pro</h1>
  <div class="sub">V1 MVP · X01 Scoring für iPhone</div>

  <section id="setup" class="card">
    <h2>Neues Spiel</h2>
    <div class="row">
      <select id="startScore"><option>501</option><option>301</option><option>701</option></select>
      <select id="playerCount"><option>1</option><option selected>2</option><option>3</option><option>4</option></select>
    </div>
    <div id="names"></div>
    <button style="margin-top:10px" onclick="startGame()">Spiel starten</button>
    <p class="tiny">Speichert automatisch auf diesem iPhone. Später bauen wir Login, Online-Matches und Datenbank dazu.</p>
  </section>

  <main id="game" class="hidden">
    <div id="players" class="players"></div>
    <section class="card">
      <h2 id="turnTitle">Eingabe</h2>
      <div id="display" class="display">0</div>
      <div class="quick">
        <button onclick="setInput(26)">26</button><button onclick="setInput(45)">45</button><button onclick="setInput(60)">60</button><button onclick="setInput(100)">100</button>
        <button onclick="setInput(121)">121</button><button onclick="setInput(140)">140</button><button onclick="setInput(171)">171</button><button onclick="setInput(180)">180</button>
      </div>
      <div class="pad">
        <button onclick="num('1')">1</button><button onclick="num('2')">2</button><button onclick="num('3')">3</button>
        <button onclick="num('4')">4</button><button onclick="num('5')">5</button><button onclick="num('6')">6</button>
        <button onclick="num('7')">7</button><button onclick="num('8')">8</button><button onclick="num('9')">9</button>
        <button class="warn" onclick="clearInput()">C</button><button onclick="num('0')">0</button><button class="danger" onclick="undo()">↶</button>
      </div>
      <button style="margin-top:10px" onclick="submitScore()">Score buchen</button>
      <button class="secondary" style="margin-top:8px" onclick="resetAll()">Neues Spiel</button>
    </section>
  </main>

<script>
let players=[],current=0,input="",history=[],start=501;
const checkouts={170:"T20 T20 Bull",167:"T20 T19 Bull",164:"T20 T18 Bull",161:"T20 T17 Bull",160:"T20 T20 D20",158:"T20 T20 D19",157:"T20 T19 D20",156:"T20 T20 D18",155:"T20 T19 D19",154:"T20 T18 D20",153:"T20 T19 D18",152:"T20 T20 D16",151:"T20 T17 D20",150:"T20 T18 D18",149:"T20 T19 D16",148:"T20 T20 D14",147:"T20 T17 D18",146:"T20 T18 D16",145:"T20 T15 D20",144:"T20 T20 D12",143:"T20 T17 D16",142:"T20 T14 D20",141:"T20 T19 D12",140:"T20 T20 D10",139:"T19 T14 D20",138:"T20 T18 D12",137:"T20 T19 D10",136:"T20 T20 D8",135:"Bull T15 D20",134:"T20 T14 D16",133:"T20 T19 D8",132:"Bull Bull D16",131:"T20 T13 D16",130:"T20 T20 D5",129:"T19 T16 D12",128:"T18 T18 D10",127:"T20 T17 D8",126:"T19 T19 D6",125:"Bull T17 D12",124:"T20 T16 D8",123:"T19 T16 D9",122:"T18 T18 D7",121:"T20 T11 D14",120:"T20 20 D20",119:"T19 T12 D13",118:"T20 18 D20",117:"T20 17 D20",116:"T20 16 D20",115:"T20 15 D20",114:"T20 14 D20",113:"T20 13 D20",112:"T20 12 D20",111:"T20 11 D20",110:"T20 10 D20",109:"T20 9 D20",108:"T20 16 D16",107:"T19 18 D16",106:"T20 10 D18",105:"T20 13 D16",104:"T18 18 D16",103:"T19 10 D18",102:"T20 10 D16",101:"T17 10 D20",100:"T20 D20",99:"T19 10 D16",98:"T20 D19",97:"T19 D20",96:"T20 D18",95:"T19 D19",94:"T18 D20",93:"T19 D18",92:"T20 D16",91:"T17 D20",90:"T18 D18",89:"T19 D16",88:"T16 D20",87:"T17 D18",86:"T18 D16",85:"T15 D20",84:"T20 D12",83:"T17 D16",82:"Bull D16",81:"T19 D12",80:"T20 D10",79:"T19 D11",78:"T18 D12",77:"T19 D10",76:"T20 D8",75:"T17 D12",74:"T14 D16",73:"T19 D8",72:"T16 D12",71:"T13 D16",70:"T18 D8",69:"T19 D6",68:"T20 D4",67:"T17 D8",66:"T10 D18",65:"T19 D4",64:"T16 D8",63:"T13 D12",62:"T10 D16",61:"T15 D8",60:"20 D20",59:"19 D20",58:"18 D20",57:"17 D20",56:"16 D20",55:"15 D20",54:"14 D20",53:"13 D20",52:"12 D20",51:"11 D20",50:"Bull",49:"9 D20",48:"16 D16",47:"15 D16",46:"14 D16",45:"13 D16",44:"12 D16",43:"11 D16",42:"10 D16",41:"9 D16",40:"D20",38:"D19",36:"D18",34:"D17",32:"D16",30:"D15",28:"D14",26:"D13",24:"D12",22:"D11",20:"D10",18:"D9",16:"D8",14:"D7",12:"D6",10:"D5",8:"D4",6:"D3",4:"D2",2:"D1"};
function setupNames(){const c=+document.getElementById("playerCount").value,n=document.getElementById("names");n.innerHTML="";for(let i=0;i<c;i++){n.innerHTML+=`<input id="p${i}" placeholder="Spieler ${i+1}" style="margin-top:8px">`}}
document.getElementById("playerCount").onchange=setupNames;setupNames();
function save(){localStorage.setItem("dartScorePro",JSON.stringify({players,current,input,history,start,active:!document.getElementById("game").classList.contains("hidden")}))}
function load(){try{const s=JSON.parse(localStorage.getItem("dartScorePro")||"null");if(s&&s.active){players=s.players;current=s.current;input=s.input;history=s.history||[];start=s.start;document.getElementById("setup").classList.add("hidden");document.getElementById("game").classList.remove("hidden");render()}}catch(e){}}
function startGame(){start=+document.getElementById("startScore").value;players=[];for(let i=0;i<+document.getElementById("playerCount").value;i++){players.push({name:document.getElementById("p"+i).value.trim()||"Spieler "+(i+1),score:start,darts:0,points:0,high:0,legs:0})}current=0;input="";history=[];document.getElementById("setup").classList.add("hidden");document.getElementById("game").classList.remove("hidden");render()}
function render(){document.getElementById("players").innerHTML=players.map((p,i)=>{let avg=p.darts?(p.points/p.darts*3).toFixed(1):"0.0";let co=p.score<=170&&checkouts[p.score]?`<div class="checkout">Checkout: ${checkouts[p.score]}</div>`:"";return `<div class="player ${i===current?'active':''}"><div class="name">${p.name}${i===current?' · dran':''}</div><div class="score">${p.score}</div><div class="meta"><span>Avg ${avg}</span><span>Darts ${p.darts}</span><span>High ${p.high}</span><span>Legs ${p.legs}</span></div>${co}</div>`}).join("");document.getElementById("turnTitle").textContent=players[current].name+" ist dran";document.getElementById("display").textContent=input||"0";save()}
function num(n){if(input.length>=3)return;input+=n;if(+input>180)input="180";render()}
function setInput(v){input=String(v);render()}
function clearInput(){input="";render()}
function submitScore(){const val=+(input||0);if(val<0||val>180)return alert("Score muss 0–180 sein.");const p=players[current];history.push(JSON.parse(JSON.stringify({players,current,input})));let ns=p.score-val;if(ns<0||ns===1){alert("Bust!");p.darts+=3}else if(ns===0){p.score=0;p.darts+=3;p.points+=val;p.high=Math.max(p.high,val);render();setTimeout(()=>{alert("🎉 "+p.name+" gewinnt das Leg!");p.legs++;players.forEach(x=>{x.score=start;x.darts=0;x.points=0;x.high=0});input="";current=players.indexOf(p);render()},80);return}else{p.score=ns;p.darts+=3;p.points+=val;p.high=Math.max(p.high,val)}input="";current=(current+1)%players.length;render()}
function undo(){const h=history.pop();if(!h)return;players=h.players;current=h.current;input=h.input;render()}
function resetAll(){if(confirm("Neues Spiel starten?")){localStorage.removeItem("dartScorePro");location.reload()}}
if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}
load();
</script>
</body>
</html>
