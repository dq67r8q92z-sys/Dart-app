<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#060912" />
  <title>Dart Score Pro V5</title>
  <style>
    :root{
      --bg:#060912;--panel:#0f172a;--card:#111827;--card2:#1f2937;--text:#f9fafb;
      --muted:#9ca3af;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#38bdf8;
      --border:#334155;--purple:#a78bfa;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:radial-gradient(circle at top,#19243b,#060912 60%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px;padding-bottom:34px}
    h1{font-size:34px;margin:0 0 5px;font-weight:950;letter-spacing:-.055em}
    h2{font-size:23px;margin:0 0 14px}.sub{color:var(--muted);font-size:15px;font-weight:800;margin-bottom:18px}
    .card{background:rgba(17,24,39,.96);border:1px solid var(--border);border-radius:24px;padding:16px;margin-bottom:13px;box-shadow:0 16px 42px rgba(0,0,0,.25)}
    input,button,select{width:100%;border-radius:17px;border:1px solid var(--border);padding:15px;font-size:18px;background:var(--card2);color:var(--text)}
    button{border:0;background:var(--green);color:#04130a;font-weight:950;margin-top:9px}
    .secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
    .danger{background:var(--red);color:white}.warn{background:var(--yellow);color:#1c1000}.blue{background:var(--blue);color:#001018}
    .hidden{display:none!important}.small{font-size:13px;color:var(--muted);line-height:1.45}.ok{color:#bbf7d0;font-weight:900}.err{color:#fecaca;font-weight:900}
    .code{font-size:38px;letter-spacing:.13em;font-weight:950;text-align:center;padding:17px;border:1px dashed var(--blue);border-radius:18px;background:#020617;color:#bae6fd}
    .players{display:grid;gap:11px}.player{background:#0f172a;border:1px solid var(--border);border-radius:22px;padding:16px;transition:.15s}.active{border-color:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,.2)}
    .playerHead{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .name{font-size:15px;color:var(--muted);font-weight:850}.score{font-size:58px;font-weight:950;line-height:1}
    .meta{display:flex;gap:7px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:9px}.meta span{background:#020617;border:1px solid #1e293b;border-radius:999px;padding:5px 8px}
    .checkout{margin-top:10px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);border-radius:14px;padding:10px;color:#bbf7d0;font-weight:850}
    .display{height:68px;display:flex;align-items:center;justify-content:center;background:#020617;border:1px solid var(--border);border-radius:18px;font-size:40px;font-weight:950;margin-bottom:10px}
    .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:9px}.quick button{background:#172033;color:var(--text);padding:12px;font-size:15px;margin:0}
    .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pad button{background:var(--card2);color:var(--text);font-size:24px;padding:16px;margin:0}
    .turn{display:flex;justify-content:space-between;border-bottom:1px solid #1e293b;padding:8px 0;font-size:14px;color:var(--muted)}
    .toprow{display:flex;gap:8px}.toprow button{margin-top:0}
    .pill{display:inline-block;background:#020617;border:1px solid #1e293b;border-radius:999px;padding:7px 10px;color:var(--muted);font-size:12px;font-weight:850}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .toast{position:fixed;left:16px;right:16px;bottom:18px;background:#020617;border:1px solid var(--border);border-radius:18px;padding:13px;color:#fff;box-shadow:0 18px 40px rgba(0,0,0,.35);font-weight:800;z-index:10}
  </style>
</head>
<body>
  <h1>🎯 Dart Score Pro</h1>
  <div class="sub">V5 · Realtime · 4 Spieler · Pro UI</div>

  <section id="menu" class="card">
    <h2>Online Spiel</h2>
    <div class="grid2">
      <select id="startScore"><option>501</option><option>301</option><option>701</option></select>
      <select id="bestOf"><option value="1">1 Leg</option><option value="3">Best of 3</option><option value="5">Best of 5</option><option value="7">Best of 7</option></select>
    </div>
    <select id="playerCount" style="margin-top:9px" onchange="renderNameInputs()">
      <option value="2">2 Spieler</option>
      <option value="3">3 Spieler</option>
      <option value="4">4 Spieler</option>
    </select>
    <div id="nameInputs"></div>
    <button onclick="createGame()">Spiel erstellen</button>
    <hr style="border-color:#334155;margin:18px 0">
    <input id="joinCode" placeholder="Raum-Code eingeben">
    <button class="secondary" onclick="joinGame()">Spiel beitreten</button>
    <button class="secondary hidden" id="resumeBtn" onclick="resumeGame()">Letztes Spiel fortsetzen</button>
    <div id="menuStatus" class="small" style="margin-top:12px">Bereit.</div>
  </section>

  <main id="game" class="hidden">
    <section class="card">
      <div class="small">Raum-Code</div>
      <div id="codeDisplay" class="code">-----</div>
      <div class="toprow" style="margin-top:10px">
        <button class="secondary" onclick="copyCode()">Code kopieren</button>
        <button class="secondary" onclick="shareRoom()">Teilen</button>
      </div>
      <div id="syncStatus" class="small" style="margin-top:9px">Verbinde...</div>
      <div style="margin-top:10px">
        <span class="pill" id="modePill">REST + Realtime</span>
        <span class="pill" id="versionPill">v0</span>
      </div>
    </section>

    <div id="players" class="players"></div>

    <section class="card">
      <h2 id="turnTitle">Score eingeben</h2>
      <div id="display" class="display">0</div>
      <div class="quick">
        <button onclick="setInput(26)">26</button><button onclick="setInput(45)">45</button><button onclick="setInput(60)">60</button><button onclick="setInput(81)">81</button>
        <button onclick="setInput(100)">100</button><button onclick="setInput(121)">121</button><button onclick="setInput(140)">140</button><button onclick="setInput(180)">180</button>
      </div>
      <div class="pad">
        <button onclick="num('1')">1</button><button onclick="num('2')">2</button><button onclick="num('3')">3</button>
        <button onclick="num('4')">4</button><button onclick="num('5')">5</button><button onclick="num('6')">6</button>
        <button onclick="num('7')">7</button><button onclick="num('8')">8</button><button onclick="num('9')">9</button>
        <button class="warn" onclick="clearInput()">C</button><button onclick="num('0')">0</button><button class="danger" onclick="undoTurn()">↶</button>
      </div>
      <button onclick="submitScore()">Score buchen</button>
      <div class="toprow" style="margin-top:10px">
        <button class="secondary" onclick="newLeg()">Neues Leg</button>
        <button class="danger" onclick="leaveGame()">Verlassen</button>
      </div>
    </section>

    <section class="card">
      <h2>Letzte Würfe</h2>
      <div id="turnList" class="small">Noch keine Würfe.</div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

<script>
const SUPABASE_URL = "https://enhswbayupniwielxxqc.supabase.co";
const SUPABASE_KEY = "sb_publishable_XHyt9DuEBIp97Z0YwsoauA_ua--ZoDY";
const API = SUPABASE_URL + "/rest/v1/games";
const REALTIME_URL = SUPABASE_URL.replace("https://","wss://") + "/realtime/v1/websocket?apikey=" + encodeURIComponent(SUPABASE_KEY) + "&vsn=1.0.0";

let roomCode=null,currentState=null,input="",pollTimer=null,isSaving=false,lastVersion=0,ws=null,heartbeat=null;

const checkouts={170:"T20 T20 Bull",167:"T20 T19 Bull",164:"T20 T18 Bull",161:"T20 T17 Bull",160:"T20 T20 D20",158:"T20 T20 D19",157:"T20 T19 D20",156:"T20 T20 D18",155:"T20 T19 D19",154:"T20 T19 D19",153:"T20 T19 D18",152:"T20 T20 D16",151:"T20 T17 D20",150:"T20 T18 D18",149:"T20 T19 D16",148:"T20 T20 D14",147:"T20 T17 D18",146:"T20 T18 D16",145:"T20 T15 D20",144:"T20 T20 D12",143:"T20 T17 D16",142:"T20 T14 D20",141:"T20 T19 D12",140:"T20 T20 D10",139:"T19 T14 D20",138:"T20 T18 D12",137:"T20 T19 D10",136:"T20 T20 D8",135:"Bull T15 D20",134:"T20 T14 D16",133:"T20 T19 D8",132:"Bull Bull D16",131:"T20 T13 D16",130:"T20 T20 D5",129:"T19 T16 D12",128:"T18 T18 D10",127:"T20 T17 D8",126:"T19 T19 D6",125:"Bull T17 D12",124:"T20 T16 D8",123:"T19 T16 D9",122:"T18 T18 D7",121:"T20 T11 D14",120:"T20 20 D20",119:"T19 T12 D13",118:"T20 18 D20",117:"T20 17 D20",116:"T20 16 D20",115:"T20 15 D20",114:"T20 14 D20",113:"T20 13 D20",112:"T20 12 D20",111:"T20 11 D20",110:"T20 10 D20",109:"T20 9 D20",108:"T20 16 D16",107:"T19 18 D16",106:"T20 10 D18",105:"T20 13 D16",104:"T18 18 D16",103:"T19 10 D18",102:"T20 10 D16",101:"T17 10 D20",100:"T20 D20",99:"T19 10 D16",98:"T20 D19",97:"T19 D20",96:"T20 D18",95:"T19 D19",94:"T18 D20",93:"T19 D18",92:"T20 D16",91:"T17 D20",90:"T18 D18",89:"T19 D16",88:"T16 D20",87:"T17 D18",86:"T18 D16",85:"T15 D20",84:"T20 D12",83:"T17 D16",82:"Bull D16",81:"T19 D12",80:"T20 D10",79:"T19 D11",78:"T18 D12",77:"T19 D10",76:"T20 D8",75:"T17 D12",74:"T14 D16",73:"T19 D8",72:"T16 D12",71:"T13 D16",70:"T18 D8",69:"T19 D6",68:"T20 D4",67:"T17 D8",66:"T10 D18",65:"T19 D4",64:"T16 D8",63:"T13 D12",62:"T10 D16",61:"T15 D8",60:"20 D20",59:"19 D20",58:"18 D20",57:"17 D20",56:"16 D20",55:"15 D20",54:"14 D20",53:"13 D20",52:"12 D20",51:"11 D20",50:"Bull",49:"9 D20",48:"16 D16",47:"15 D16",46:"14 D16",45:"13 D16",44:"12 D16",43:"11 D16",42:"10 D16",41:"9 D16",40:"D20",38:"D19",36:"D18",34:"D17",32:"D16",30:"D15",28:"D14",26:"D13",24:"D12",22:"D11",20:"D10",18:"D9",16:"D8",14:"D7",12:"D6",10:"D5",8:"D4",6:"D3",4:"D2",2:"D1"};

function headers(extra={}){return {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json",...extra}}
function toast(t){const el=document.getElementById("toast");el.innerText=t;el.classList.remove("hidden");setTimeout(()=>el.classList.add("hidden"),1700)}
function setMenuStatus(t,bad=false){document.getElementById("menuStatus").innerHTML=bad?`<span class="err">${t}</span>`:`<span class="ok">${t}</span>`}
function setStatus(t,ok=true){document.getElementById("syncStatus").innerHTML=ok?`<span class="ok">${t}</span>`:`<span class="err">${t}</span>`}
function generateCode(){return Math.random().toString(36).substring(2,7).toUpperCase()}
function now(){return new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}

function renderNameInputs(){
  const count=parseInt(document.getElementById("playerCount").value);
  const box=document.getElementById("nameInputs");
  box.innerHTML="";
  for(let i=0;i<count;i++){
    box.innerHTML += `<input id="p${i}Name" value="Spieler ${i+1}" placeholder="Spieler ${i+1}" style="margin-top:9px">`;
  }
}
renderNameInputs();

function makeState(){
  const start=parseInt(document.getElementById("startScore").value);
  const count=parseInt(document.getElementById("playerCount").value);
  const players=[];
  for(let i=0;i<count;i++){
    const name=(document.getElementById(`p${i}Name`)?.value)||`Spieler ${i+1}`;
    players.push({name,score:start,darts:0,points:0,high:0,legs:0,one80:0,one40:0,one00:0});
  }
  return {start,bestOf:parseInt(document.getElementById("bestOf").value),current:0,version:1,updatedAt:new Date().toISOString(),players,turns:[],history:[]};
}

async function createGame(){
  try{
    setMenuStatus("Erstelle Raum...");
    roomCode=generateCode();currentState=makeState();
    const res=await fetch(API,{method:"POST",headers:headers({"Prefer":"return=representation"}),body:JSON.stringify({room_code:roomCode,state:currentState})});
    const text=await res.text();
    if(!res.ok){setMenuStatus("Fehler: "+text,true);return}
    localStorage.setItem("lastRoomCode",roomCode);openGame();
  }catch(e){setMenuStatus("Browser/Netzwerk Fehler: "+e.message,true)}
}
async function joinGame(){
  roomCode=document.getElementById("joinCode").value.trim().toUpperCase();
  if(!roomCode){setMenuStatus("Bitte Code eingeben.",true);return}
  await loadAndOpen(roomCode);
}
async function resumeGame(){const code=localStorage.getItem("lastRoomCode");if(code) await loadAndOpen(code)}
async function fetchGame(code){
  const url=API+"?room_code=eq."+encodeURIComponent(code)+"&select=*";
  const res=await fetch(url,{headers:headers()});const data=await res.json();
  if(!res.ok||!data.length)return null;return data[0];
}
async function loadAndOpen(code){
  try{setMenuStatus("Suche Raum...");const data=await fetchGame(code);if(!data){setMenuStatus("Raum nicht gefunden.",true);return}
    roomCode=code;currentState=data.state;localStorage.setItem("lastRoomCode",roomCode);openGame();
  }catch(e){setMenuStatus("Fehler: "+e.message,true)}
}
function openGame(){
  document.getElementById("menu").classList.add("hidden");document.getElementById("game").classList.remove("hidden");
  document.getElementById("codeDisplay").innerText=roomCode;lastVersion=currentState.version||0;render();startPolling();startRealtime();
}
function startPolling(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(loadState,2500);setStatus("Online verbunden · "+now())}
async function loadState(){
  if(isSaving||!roomCode)return;
  try{const data=await fetchGame(roomCode);if(data&&data.state){const v=data.state.version||0;if(v>=lastVersion){currentState=data.state;lastVersion=v;render();setStatus("Sync · "+now())}}}
  catch(e){setStatus("Sync Fehler: "+e.message,false)}
}
function startRealtime(){
  try{
    if(ws) ws.close();
    ws=new WebSocket(REALTIME_URL);
    ws.onopen=()=>{
      document.getElementById("modePill").innerText="Realtime + REST";
      ws.send(JSON.stringify({topic:"realtime:public:games",event:"phx_join",payload:{config:{postgres_changes:[{event:"UPDATE",schema:"public",table:"games",filter:`room_code=eq.${roomCode}`}]}},ref:"1"}));
      heartbeat=setInterval(()=>{try{ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:String(Date.now())}))}catch(e){}},25000);
    };
    ws.onmessage=(msg)=>{
      try{
        const data=JSON.parse(msg.data);
        const rec=data.payload?.data?.record;
        if(rec?.state){
          const v=rec.state.version||0;
          if(v>=lastVersion){currentState=rec.state;lastVersion=v;render();setStatus("Realtime · "+now());}
        }
      }catch(e){}
    };
    ws.onerror=()=>{document.getElementById("modePill").innerText="REST Fallback"};
    ws.onclose=()=>{if(heartbeat)clearInterval(heartbeat);document.getElementById("modePill").innerText="REST Fallback"};
  }catch(e){document.getElementById("modePill").innerText="REST Fallback"}
}
async function saveState(){
  isSaving=true;currentState.version=(currentState.version||0)+1;currentState.updatedAt=new Date().toISOString();lastVersion=currentState.version;
  const url=API+"?room_code=eq."+encodeURIComponent(roomCode);
  const res=await fetch(url,{method:"PATCH",headers:headers({"Prefer":"return=minimal"}),body:JSON.stringify({state:currentState})});
  isSaving=false;if(!res.ok){alert("Speichern fehlgeschlagen: "+await res.text())}else{setStatus("Gespeichert · "+now())}
}
function avg(p){return p.darts?(p.points/p.darts*3).toFixed(1):"0.0"}
function render(){
  if(!currentState)return;const needed=Math.ceil(currentState.bestOf/2);
  document.getElementById("versionPill").innerText="v"+(currentState.version||0);
  document.getElementById("players").innerHTML=currentState.players.map((p,i)=>{
    const co=p.score<=170&&checkouts[p.score]?`<div class="checkout">Checkout: ${checkouts[p.score]}</div>`:"";
    return `<div class="player ${i===currentState.current?'active':''}">
      <div class="playerHead"><div class="name">${p.name}${i===currentState.current?' · dran':''}</div><span class="pill">${p.legs}/${needed} Legs</span></div>
      <div class="score">${p.score}</div>
      <div class="meta"><span>Avg ${avg(p)}</span><span>Darts ${p.darts}</span><span>High ${p.high}</span><span>100+ ${p.one00}</span><span>140+ ${p.one40}</span><span>180 ${p.one80}</span></div>${co}
    </div>`;
  }).join("");
  document.getElementById("turnTitle").innerText=currentState.players[currentState.current].name+" ist dran";
  document.getElementById("display").innerText=input||"0";
  document.getElementById("turnList").innerHTML=currentState.turns.slice(-10).reverse().map(t=>`<div class="turn"><span>${t.time} · ${t.player}</span><b>${t.score}</b><span>Rest ${t.rest}</span></div>`).join("")||"Noch keine Würfe.";
}
function num(n){if(input.length>=3)return;input+=n;if(+input>180)input="180";render()}
function setInput(v){input=String(v);render()}
function clearInput(){input="";render()}
function countMilestones(p,v){if(v===180)p.one80++; if(v>=140)p.one40++; if(v>=100)p.one00++}
async function submitScore(){
  const val=parseInt(input||"0");if(isNaN(val)||val<0||val>180)return alert("Score muss 0–180 sein.");
  const p=currentState.players[currentState.current];currentState.history.push(JSON.parse(JSON.stringify(currentState)));const ns=p.score-val;
  if(ns<0||ns===1){p.darts+=3;currentState.turns.push({time:now(),player:p.name,score:"Bust "+val,rest:p.score});currentState.current=(currentState.current+1)%currentState.players.length}
  else if(ns===0){p.score=0;p.darts+=3;p.points+=val;p.high=Math.max(p.high,val);countMilestones(p,val);currentState.turns.push({time:now(),player:p.name,score:val,rest:0});p.legs++;const needed=Math.ceil(currentState.bestOf/2);if(p.legs>=needed){input="";render();await saveState();alert("🏆 Match gewonnen: "+p.name);return}toast("Leg gewonnen: "+p.name);resetLegScores()}
  else{p.score=ns;p.darts+=3;p.points+=val;p.high=Math.max(p.high,val);countMilestones(p,val);currentState.turns.push({time:now(),player:p.name,score:val,rest:p.score});currentState.current=(currentState.current+1)%currentState.players.length}
  input="";render();await saveState();
}
function resetLegScores(){currentState.players.forEach(x=>{x.score=currentState.start;x.darts=0;x.points=0;x.high=0});currentState.current=0}
async function newLeg(){if(!confirm("Neues Leg starten?"))return;currentState.history.push(JSON.parse(JSON.stringify(currentState)));resetLegScores();currentState.turns.push({time:now(),player:"System",score:"Neues Leg",rest:"-"});render();await saveState()}
async function undoTurn(){if(!currentState.history.length)return alert("Kein Undo verfügbar.");currentState=currentState.history.pop();input="";render();await saveState()}
function copyCode(){navigator.clipboard.writeText(roomCode).then(()=>toast("Code kopiert: "+roomCode))}
function shareRoom(){const txt="Dart Match Code: "+roomCode;if(navigator.share)navigator.share({title:"Dart Score Pro",text:txt});else copyCode()}
function leaveGame(){if(pollTimer)clearInterval(pollTimer);if(ws)ws.close();roomCode=null;currentState=null;input="";document.getElementById("game").classList.add("hidden");document.getElementById("menu").classList.remove("hidden")}
window.addEventListener("load",()=>{const last=localStorage.getItem("lastRoomCode");if(last)document.getElementById("resumeBtn").classList.remove("hidden")});
</script>
</body>
</html>
